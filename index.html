<script>

const codeReader = new ZXing.BrowserMultiFormatReader();

let controls = null;

async function mulaiScan(){

    try{

        document.getElementById("hasil").innerHTML="Meminta izin kamera...";

        // Minta izin kamera terlebih dahulu
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{ideal:"environment"}
            }
        });

        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();

        if(devices.length===0){
            alert("Tidak ditemukan kamera.");
            return;
        }

        let cameraId = devices[0].deviceId;

        // Pilih kamera belakang jika ada
        devices.forEach(device=>{

            const label=(device.label||"").toLowerCase();

            if(
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            ){
                cameraId=device.deviceId;
            }

        });

        document.getElementById("hasil").innerHTML="Membuka kamera...";

        controls = await codeReader.decodeFromVideoDevice(
            cameraId,
            "video",
            (result,error)=>{

                if(result){

                    document.getElementById("hasil").innerHTML=result.text;

                    navigator.vibrate?.(100);

                    controls.stop();

                }

            }
        );

    }catch(err){

        console.error(err);

        alert(
            "Gagal membuka kamera.\n\n"+
            err.message
        );

    }

}

</script>
