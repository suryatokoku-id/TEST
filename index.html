<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryatokoku — Portal Cek Harga Modern</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        /* Scanner laser */
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .scanner-laser {
            position: absolute;
            height: 3px;
            width: 100%;
            background: linear-gradient(to right, transparent, #10b981, transparent);
            animation: scan 2s linear infinite;
            box-shadow: 0 0 10px #10b981;
        }
        
        /* Reset style bawaan html5-qrcode */
        #reader {
            border: none !important;
        }
        #reader video {
            border-radius: 1.25rem !important;
            object-fit: cover !important;
            width: 100% !important;
            height: auto !important;
        }
    </style>
    <script>
        // Fungsi aman untuk menangani error pemuatan gambar tanpa merusak atribut HTML
        function handleLogoError(img, type) {
            img.onerror = null; // Menghindari loop tak terbatas jika SVG pun bermasalah
            if (type === 'splash') {
                img.outerHTML = `
                    <div class="bg-gradient-to-tr from-[#ff4fa3] to-[#d93a83] text-white p-6 rounded-3xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </div>
                `;
            } else if (type === 'header') {
                img.outerHTML = `
                    <div class="bg-white/15 p-2.5 rounded-2xl backdrop-blur-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </div>
                `;
            }
        }
    </script>
</head>
<body class="text-slate-800 min-h-screen pb-16 bg-[#fafbfc]">

    <!-- PREMIUM SPLASH LOADING SCREEN -->
    <div id="splash-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
        <div class="relative flex flex-col items-center text-center px-6 max-w-sm">
            <!-- Pulsing Elegant Ring -->
            <div class="absolute w-36 h-36 bg-pink-100/60 rounded-full animate-ping"></div>
            
            <!-- Modern Store Logo Container (Menggunakan Gambar Logo Surtok 3D) -->
            <div class="relative mb-6">
                <img src="Logo%20Surtok%203D.png" onerror="handleLogoError(this, 'splash')" class="h-20 w-20 object-contain">
            </div>
            
            <!-- Brand & Status Loading Text -->
            <h2 class="text-slate-900 text-2xl font-extrabold tracking-tight mb-2">SURYATOKOKU</h2>
            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-slate-50 border border-slate-100 rounded-full text-[11px] font-semibold text-slate-500 mb-6">
                <span class="w-1.5 h-1.5 rounded-full bg-[#ff4fa3] animate-pulse"></span>
                <span>Sinkronisasi Data Produk...</span>
            </div>
            <p id="splash-status" class="text-slate-400 text-xs font-medium">Menghubungkan ke database pusat secara aman</p>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div class="max-w-md mx-auto px-4 pt-6">
        
        <!-- HEADER BRAND -->
        <header class="bg-gradient-to-r from-[#ff4fa3] to-[#e03a89] rounded-3xl p-6 text-white shadow-xl shadow-pink-500/10 mb-5 relative overflow-hidden">
            <!-- Decorative blur background items -->
            <div class="absolute -right-12 -bottom-12 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
            <div class="absolute -left-6 -top-6 w-24 h-24 bg-pink-300/20 rounded-full blur-lg"></div>
            
            <div class="relative z-10 flex flex-col items-center text-center">
                <div class="mb-3">
                    <img src="Logo%20Surtok%203D.png" onerror="handleLogoError(this, 'header')" class="h-12 w-12 object-contain">
                </div>
                
                <h1 class="text-[10px] font-bold uppercase tracking-wider text-pink-100 mb-0.5">Sistem Cek Harga</h1>
                <h2 class="text-2xl font-extrabold tracking-tight">SURYATOKOKU</h2>
                
                <!-- Status Badge -->
                <div id="db-status" class="mt-4 inline-flex items-center gap-1.5 px-3 py-1 bg-white/10 rounded-full text-[11px] font-medium backdrop-blur-md border border-white/10">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>
                    <span>Menghubungkan database...</span>
                </div>
            </div>
        </header>

        <!-- SEARCH CONTAINER -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-5">
            <div class="space-y-3">
                <!-- 1. OPTIONAL PREFIX SEARCH (AWAL NAMA SAJA) -->
                <div class="relative">
                    <input id="start-name" type="text" placeholder="Isi nama produk dari awal (opsional)..." 
                        class="w-full pl-11 pr-11 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-pink-500/10 focus:border-[#ff4fa3] focus:bg-white text-xs font-semibold transition-all placeholder-slate-400">
                    
                    <!-- Alphabet Prefix Icon -->
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" />
                        </svg>
                    </div>

                    <!-- Clear Button -->
                    <button id="clear-start-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 hidden transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </</button>
                </div>

                <!-- 2. MAIN SEARCH INPUT -->
                <div class="relative">
                    <input id="keyword" type="text" placeholder="Isi nama produk / kode item / barcode" 
                        class="w-full pl-11 pr-24 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-pink-500/10 focus:border-[#ff4fa3] focus:bg-white text-sm font-medium transition-all placeholder-slate-400">
                    
                    <!-- Search Icon Left -->
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>

                    <!-- Right Controls: Voice, Clear -->
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-1">
                        <!-- Clear Button -->
                        <button id="clear-btn" class="text-slate-400 hover:text-slate-700 hidden p-1 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                            </svg>
                        </button>
                        <!-- Voice Search Button -->
                        <button id="voice-btn" onclick="startVoiceSearch()" class="text-[#ff4fa3] hover:bg-pink-50 p-1.5 rounded-lg transition-all" title="Cari dengan Suara">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Scanner Button Primary -->
            <button onclick="startScanner()" class="mt-4 w-full bg-slate-900 hover:bg-slate-850 text-white font-bold text-sm py-4 rounded-2xl flex items-center justify-center gap-2.5 transition-all shadow-md shadow-slate-900/5 active:scale-[0.99]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                <span>SCAN PRODUK DENGAN KAMERA</span>
            </button>
        </div>

        <!-- CAMERA SCANNER VIEWPORT MODAL-LIKE -->
        <div id="scanner-wrapper" class="hidden bg-slate-950 rounded-3xl p-4 mb-5 relative overflow-hidden border border-slate-800 shadow-inner">
            <div class="flex items-center justify-between mb-3 text-white">
                <span class="text-xs font-semibold tracking-wider text-emerald-400 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
                    Kamera Aktif
                </span>
                <button onclick="stopScanner()" class="text-xs bg-white/10 hover:bg-red-500 text-slate-250 hover:text-white px-3 py-1.5 rounded-xl font-bold transition-all">
                    Tutup
                </button>
            </div>
            
            <div class="relative rounded-2xl bg-black border border-slate-800 p-0.5">
                <div id="reader" class="w-full"></div>
                <!-- Laser Overlay -->
                <div id="laser-effect" class="absolute top-0 left-0 w-full h-full pointer-events-none z-10 hidden">
                    <div class="scanner-laser"></div>
                </div>
            </div>
            <p class="text-[11px] text-slate-400 text-center mt-2.5">Arahkan kamera ke bagian barcode produk secara fokus</p>
        </div>

        <!-- RESULTS LIST -->
        <main id="hasil" class="space-y-3.5"></main>
    </div>

    <!-- NEW TOP FLOATING TOAST NOTIFICATION (iOS/Android Style) -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 bg-white/95 backdrop-blur-md border border-slate-100/80 px-4.5 py-3 rounded-2xl shadow-xl shadow-slate-200/50 transform -translate-y-24 opacity-0 transition-all duration-300 pointer-events-none max-w-sm w-[90%]">
        <div id="toast-icon-wrapper" class="p-2 rounded-xl text-sm flex items-center justify-center"></div>
        <div class="flex-1">
            <p id="toast-title" class="text-xs font-bold text-slate-900"></p>
            <p id="toast-message" class="text-[11px] text-slate-500 font-medium"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw0g2jFI8AD3UfthUcqubE7wCaOdPhyeuJ1tt5J-rrlODUKy2hplh_3vVnxfI3Jtt3p/exec";
        
        let currentProducts = [];
        let allProducts = [];
        let qr = null;

        // INDEXEDDB CONFIGURATION FOR INSTANT LOADING
        const DB_NAME = "SuryatokokuLocalDB";
        const STORE_NAME = "product_cache";

        const startNameInput = document.getElementById("start-name");
        const clearStartBtn = document.getElementById("clear-start-btn");
        const keywordInput = document.getElementById("keyword");
        const clearBtn = document.getElementById("clear-btn");
        const hasilDiv = document.getElementById("hasil");
        const dbStatus = document.getElementById("db-status");
        const splashScreen = document.getElementById("splash-screen");
        const splashStatus = document.getElementById("splash-status");

        // Event listener for starts-with search
        startNameInput.addEventListener("input", () => {
            if (startNameInput.value.length > 0) {
                clearStartBtn.classList.remove("hidden");
            } else {
                clearStartBtn.classList.add("hidden");
            }
            cariProduk();
        });

        clearStartBtn.addEventListener("click", () => {
            startNameInput.value = "";
            clearStartBtn.classList.add("hidden");
            cariProduk();
            startNameInput.focus();
        });

        // Event listener for main search
        keywordInput.addEventListener("input", () => {
            if (keywordInput.value.length > 0) {
                clearBtn.classList.remove("hidden");
            } else {
                clearBtn.classList.add("hidden");
            }
            cariProduk();
        });

        clearBtn.addEventListener("click", () => {
            keywordInput.value = "";
            clearBtn.classList.add("hidden");
            cariProduk();
            keywordInput.focus();
        });

        window.onload = loadData;

        // Modern top-slide toast notification system
        function showToast(title, message, type = 'info') {
            const toast = document.getElementById("toast");
            const iconWrapper = document.getElementById("toast-icon-wrapper");
            const titleElem = document.getElementById("toast-title");
            const msgElem = document.getElementById("toast-message");

            titleElem.innerText = title;
            msgElem.innerText = message;

            // Icon configuration based on status
            if (type === 'success') {
                iconWrapper.className = "p-1.5 rounded-lg bg-emerald-50 text-emerald-600 border border-emerald-100";
                iconWrapper.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                    </svg>
                `;
            } else if (type === 'error') {
                iconWrapper.className = "p-1.5 rounded-lg bg-rose-50 text-rose-600 border border-rose-100";
                iconWrapper.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                `;
            } else {
                iconWrapper.className = "p-1.5 rounded-lg bg-sky-50 text-sky-600 border border-sky-100";
                iconWrapper.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                `;
            }

            // Animate In (iOS style slide-down)
            toast.classList.remove("-translate-y-24", "opacity-0");
            toast.classList.add("translate-y-0", "opacity-100");

            setTimeout(() => {
                // Animate Out
                toast.classList.add("-translate-y-24", "opacity-0");
                toast.classList.remove("translate-y-0", "opacity-100");
            }, 3000);
        }

        // --- INDEXEDDB HELPER FUNCTIONS ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getCachedProducts() {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get("all_products");
                    request.onsuccess = () => resolve(request.result || null);
                    request.onerror = () => reject(request.error);
                });
            } catch (e) {
                console.error("Gagal memuat cache lokal:", e);
                return null;
            }
        }

        async function saveProductsToCache(data) {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(data, "all_products");
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            } catch (e) {
                console.error("Gagal menyimpan cache baru:", e);
            }
        }

        // --- MAIN DATA LOADING LOGIC (STALE-WHILE-REVALIDATE) ---
        async function loadData() {
            try {
                splashStatus.innerText = "Memeriksa basis data lokal...";
                
                // Ambil data dari penyimpanan lokal (IndexedDB)
                const cachedData = await getCachedProducts();

                if (cachedData && cachedData.length > 0) {
                    // JIKA ADA CACHE: Langsung tampilkan database lokal agar instan
                    allProducts = cachedData;
                    
                    dbStatus.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full bg-[#ff4fa3] animate-pulse"></span>
                        <span>Mode Lokal: ${allProducts.length.toLocaleString("id-ID")} Produk</span>
                    `;

                    // Tutup splash screen seketika
                    splashScreen.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        splashScreen.classList.add("hidden");
                    }, 500);

                    // Sinkronisasi data terbaru di latar belakang
                    fetchFreshData(true);
                } else {
                    // JIKA TIDAK ADA CACHE: Unduh penuh database di awal
                    splashStatus.innerText = "Memuat database awal (Mohon ditunggu...)";
                    await fetchFreshData(false);
                }
            } catch (err) {
                console.error(err);
                await fetchFreshData(false);
            }
        }

        // Mengunduh database terbaru online
        async function fetchFreshData(isBackground = false) {
            try {
                const res = await fetch(API_URL + "?action=load");
                const json = await res.json();
                const freshProducts = json.data || [];

                if (freshProducts.length > 0) {
                    allProducts = freshProducts;
                    await saveProductsToCache(freshProducts);
                }

                // Update status badge menjadi Hijau Aktif
                dbStatus.innerHTML = `
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                    <span>Database Sinkron: ${allProducts.length.toLocaleString("id-ID")} Produk</span>
                `;

                if (!isBackground) {
                    splashScreen.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        splashScreen.classList.add("hidden");
                    }, 500);
                    showToast("Selesai", `${allProducts.length.toLocaleString("id-ID")} produk berhasil disinkronkan`, 'success');
                } else {
                    showToast("Sinkronisasi Selesai", "Database produk berhasil diperbarui di latar belakang", "success");
                }
            } catch (err) {
                console.error("Gagal melakukan sinkronisasi database:", err);
                
                if (!isBackground) {
                    dbStatus.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                        <span>Gagal Terhubung ke Database</span>
                    `;

                    splashScreen.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        splashScreen.classList.add("hidden");
                    }, 500);

                    hasilDiv.innerHTML = `
                        <div class="bg-rose-50 border border-rose-100 rounded-3xl p-6 text-center shadow-sm">
                            <div class="font-bold text-slate-900 text-sm mb-1">Gagal Sinkronisasi Pertama</div>
                            <p class="text-xs text-rose-600 mb-3">Pastikan koneksi internet stabil lalu ketuk muat ulang.</p>
                            <button onclick="location.reload()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-850 text-white rounded-xl text-xs font-bold transition-all shadow-sm">Muat Ulang</button>
                        </div>
                    `;
                    showToast("Gagal Sinkronisasi", "Gagal memuat basis data online utama", "error");
                } else {
                    dbStatus.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                        <span>Offline: ${allProducts.length.toLocaleString("id-ID")} Produk</span>
                    `;
                    showToast("Mode Offline", "Menggunakan basis data lokal (Offline)", "info");
                }
            }
        }

        function cariProduk() {
            const startName = startNameInput.value.trim().toLowerCase();
            const keyword = keywordInput.value.trim().toLowerCase();

            // Jika kedua kolom pencarian kosong, bersihkan daftar
            if (!startName && !keyword) {
                hasilDiv.innerHTML = "";
                return;
            }

            currentProducts = allProducts.filter(item => {
                // 1. Filter awal nama (jika kolom diisi)
                let matchesStartName = true;
                if (startName) {
                    matchesStartName = String(item.nama || "").toLowerCase().startsWith(startName);
                }

                // 2. Filter kata kunci bebas (jika kolom diisi)
                let matchesKeyword = true;
                if (keyword) {
                    matchesKeyword = String(item.barcode || "").toLowerCase().includes(keyword) ||
                                     String(item.kode || "").toLowerCase().includes(keyword) ||
                                     String(item.nama || "").toLowerCase().includes(keyword);
                }

                return matchesStartName && matchesKeyword;
            });

            tampilkanProduk();
        }

        function tampilkanProduk() {
            if (currentProducts.length === 0) {
                hasilDiv.innerHTML = `
                    <div class="bg-white rounded-3xl p-8 text-center border border-slate-100 shadow-sm">
                        <div class="w-12 h-12 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">Produk Tidak Ditemukan</h3>
                        <p class="text-xs text-slate-450 mt-1">Gunakan kata pencarian lain atau pastikan barcode sudah sesuai.</p>
                    </div>
                `;
                return;
            }

            let html = "";
            currentProducts.slice(0, 20).forEach(item => {
                html += `
                    <div class="bg-white rounded-2xl p-4 border border-slate-100/80 shadow-sm hover:shadow-md transition-all duration-300">
                        <!-- Top Metadata & Title -->
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[9px] font-extrabold uppercase tracking-widest px-2.5 py-0.5 bg-slate-100 text-slate-500 rounded-md">
                                    KODE: ${item.kode || '-'}
                                </span>
                                ${item.barcode ? `
                                    <span class="text-[9px] font-bold px-2.5 py-0.5 bg-pink-50 text-[#ff4fa3] rounded-md flex items-center gap-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M6 20a1 1 0 001-1v-4.586a1 1 0 01.293-.707l7-7a1 1 0 00-1.414-1.414l-7 7a1 1 0 00-.293.707V19a1 1 0 001 1z" />
                                        </svg>
                                        ${item.barcode}
                                    </span>
                                ` : ''}
                            </div>
                            <h3 class="font-extrabold text-slate-800 text-[14px] leading-tight tracking-tight mt-1">${item.nama}</h3>
                        </div>

                        <!-- Price Section (Tidy 3-Column Dashboard Layout) -->
                        <div class="grid grid-cols-3 gap-1.5 mt-3">
                            <!-- Non Member -->
                            <div class="bg-slate-50/70 p-2.5 rounded-xl border border-slate-100/50 text-center">
                                <span class="block text-[8px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Non-Member</span>
                                <span class="block text-xs md:text-sm font-extrabold text-slate-700">Rp ${rupiah(item.non)}</span>
                            </div>

                            <!-- Member Ecer -->
                            <div class="bg-pink-50/20 p-2.5 rounded-xl border border-pink-100/30 text-center">
                                <span class="block text-[8px] font-extrabold text-[#ff4fa3] uppercase tracking-widest mb-1">Ecer</span>
                                <span class="block text-xs md:text-sm font-black text-[#ff4fa3]">Rp ${rupiah(item.ecer)}</span>
                            </div>

                            <!-- Member Grosir -->
                            <div class="bg-indigo-50/20 p-2.5 rounded-xl border border-indigo-100/30 text-center">
                                <span class="block text-[8px] font-extrabold text-indigo-500 uppercase tracking-widest mb-1">Grosir</span>
                                <span class="block text-xs md:text-sm font-black text-indigo-700">Rp ${rupiah(item.grosir)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            hasilDiv.innerHTML = html;
        }

        function rupiah(x) {
            return Number(x || 0).toLocaleString("id-ID");
        }

        // --- FEATURE: AI VOICE SEARCH & RECOGNITION ---
        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showToast("Kesalahan", "Peramban Anda tidak mendukung penelusuran suara.", "error");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "id-ID"; // Set Bahasa Indonesia
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const voiceBtn = document.getElementById("voice-btn");
            voiceBtn.classList.add("animate-pulse", "bg-pink-100");
            showToast("Mendengarkan", "Silakan sebutkan nama produk secara jelas...", "info");

            recognition.start();

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                keywordInput.value = speechResult;
                clearBtn.classList.remove("hidden");
                cariProduk();
                showToast("Pencarian Suara", `Mencari untuk: "${speechResult}"`, "success");
            };

            recognition.onspeechend = () => {
                recognition.stop();
                voiceBtn.classList.remove("animate-pulse", "bg-pink-100");
            };

            recognition.onerror = (event) => {
                console.error("Voice recognition error:", event.error);
                voiceBtn.classList.remove("animate-pulse", "bg-pink-100");
                showToast("Kesalahan Mikrofon", "Gagal mendeteksi suara Anda. Silakan coba lagi.", "error");
            };
        }

        // --- OPTIMIZED CAMERA SCANNER LOGIC ---

        // Fungsi pembantu cerdas mencari modul kamera belakang terbaik (menghindari ultra-wide/distorsi)
        async function getBestRearCameraId() {
            try {
                const devices = await Html5Qrcode.getCameras();
                if (!devices || devices.length === 0) return null;

                let bestCamera = null;
                let highestScore = -100;

                for (const device of devices) {
                    const label = (device.label || "").toLowerCase();
                    let score = 0;

                    // Lewati langsung kamera depan
                    if (label.includes("front") || label.includes("selfie") || label.includes("user") || label.includes("secondary")) {
                        continue;
                    }

                    // Deteksi kamera belakang
                    if (label.includes("back") || label.includes("rear") || label.includes("environment") || label.includes("camera 0") || label.includes("camera 1")) {
                        score += 50;
                    }

                    // Prioritaskan kamera utama / main / primary (memiliki jarak fokus makro standar)
                    if (label.includes("main") || label.includes("primary") || label.includes("standard") || label.includes("biasa")) {
                        score += 30;
                    }

                    // Hindari lensa Ultra-Wide karena distorsi pinggiran membuat barcode sulit didekode
                    if (label.includes("ultra") || label.includes("wide") && label.includes("ultra")) {
                        score -= 40;
                    }

                    // Hindari juga lensa macro / telephoto super zoom yang sensitif getaran
                    if (label.includes("tele") || label.includes("zoom") || label.includes("macro") || label.includes("depth")) {
                        score -= 20;
                    }

                    if (score > highestScore) {
                        highestScore = score;
                        bestCamera = device;
                    }
                }

                return bestCamera ? bestCamera.id : null;
            } catch (e) {
                console.warn("Gagal mengevaluasi daftar kamera: ", e);
                return null;
            }
        }

        // Fungsi konfigurasi kontrol focus berkelanjutan & perbesaran anti-distorsi
        function optimizeCameraTrackSettings() {
            try {
                if (!qr) return;
                const track = qr.getRunningTrack();
                if (track && typeof track.getCapabilities === 'function') {
                    const capabilities = track.getCapabilities();
                    const constraints = {};

                    // 1. Paksa mode fokus kontinu untuk menajamkan barcode garis
                    if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                        constraints.focusMode = 'continuous';
                    }

                    // 2. Berikan sedikit digital zoom (1.35x) untuk menetralkan distorsi lensa wide-angle bawaan HP modern
                    if (capabilities.zoom) {
                        const minZoom = capabilities.zoom.min || 1;
                        const maxZoom = capabilities.zoom.max || 1;
                        const targetZoom = Math.min(minZoom * 1.35, maxZoom);
                        if (targetZoom > minZoom) {
                            constraints.zoom = targetZoom;
                        }
                    }

                    if (Object.keys(constraints).length > 0) {
                        track.applyConstraints({ advanced: [constraints] }).catch(() => {});
                    }
                }
            } catch (e) {
                console.warn("Gagal mengoptimalkan setelan track kamera WebRTC: ", e);
            }
        }

        async function startScanner() {
            if (qr) {
                stopScanner();
                return;
            }

            const wrapper = document.getElementById("scanner-wrapper");
            const laser = document.getElementById("laser-effect");
            
            wrapper.classList.remove("hidden");
            laser.classList.remove("hidden");
            document.getElementById("reader").innerHTML = "";

            qr = new Html5Qrcode("reader");

            // Hanya batasi format barcode yang umum untuk produk retail toko (Meningkatkan performa decoder secara signifikan)
            let supportedFormats = [];
            if (typeof Html5QrcodeSupportedFormats !== "undefined") {
                supportedFormats = [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E,
                    Html5QrcodeSupportedFormats.CODE_128
                ];
            }

            // Area scan terfokus horizontal (Cocok untuk barcode garis yang melebar, menghemat daya CPU)
            const getQrBoxSize = (width, height) => {
                const boxWidth = Math.floor(Math.min(width * 0.85, 360));
                const boxHeight = Math.floor(Math.min(height * 0.35, 130));
                return { width: boxWidth, height: boxHeight };
            };

            const bestCameraId = await getBestRearCameraId();

            // Rangkaian Cascading Fallback Constraints (Adaptasi penuh multi-perangkat & iOS Safari)
            const attempts = [
                // Upaya 1: ID Kamera Terbaik dengan resolusi tajam & rasio 4:3 standar
                {
                    cameraId: bestCameraId ? bestCameraId : { facingMode: "environment" },
                    config: {
                        fps: 30,
                        qrbox: getQrBoxSize,
                        aspectRatio: 1.333333,
                        videoConstraints: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    }
                },
                // Upaya 2: ID Kamera Terbaik tanpa spesifikasi video rigid (Bagus untuk browser bawaan)
                {
                    cameraId: bestCameraId ? bestCameraId : { facingMode: "environment" },
                    config: {
                        fps: 30,
                        qrbox: getQrBoxSize,
                        aspectRatio: 1.333333
                    }
                },
                // Upaya 3: Mode Generik (facingMode "environment") + Resolusi Fleksibel
                {
                    cameraId: { facingMode: "environment" },
                    config: {
                        fps: 30,
                        qrbox: getQrBoxSize,
                        aspectRatio: 1.333333,
                        videoConstraints: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    }
                },
                // Upaya 4: Skema Dasar Minimalis (Sangat aman untuk browser iOS Safari versi lawas)
                {
                    cameraId: { facingMode: "environment" },
                    config: {
                        fps: 24,
                        qrbox: getQrBoxSize
                    }
                }
            ];

            // Eksekusi runtunan inisiasi
            let success = false;
            for (let i = 0; i < attempts.length; i++) {
                try {
                    const attempt = attempts[i];
                    
                    // Suntik format barcode & fitur eksperimental penunjang performa
                    attempt.config.formatsToSupport = supportedFormats;
                    attempt.config.experimentalFeatures = {
                        useBarCodeDetectorIfSupported: true // Gunakan native API bawaan sistem jika OS mendukung
                    };

                    await qr.start(
                        attempt.cameraId,
                        attempt.config,
                        (decoded) => {
                            keywordInput.value = decoded;
                            clearBtn.classList.remove("hidden");
                            
                            if (navigator.vibrate) {
                                try {
                                    navigator.vibrate(100);
                                } catch(vErr){}
                            }

                            stopScanner();
                            cariProduk();
                            showToast("Sukses", "Barcode berhasil dipindai!", "success");
                        },
                        (error) => {
                            // Menghindari log error pencarian frame demi menjaga performa CPU tetap dingin
                        }
                    );

                    // Optimalkan autofocus & digital zoom pasca kamera aktif
                    optimizeCameraTrackSettings();
                    
                    success = true;
                    break; 
                } catch (err) {
                    console.warn(`Upaya pemuatan kamera ke-${i + 1} gagal, mencoba cadangan selanjutnya...`, err);
                }
            }

            if (!success) {
                showToast("Akses Ditolak", "Gagal mengaktifkan kamera atau izin kamera ditolak perangkat.", "error");
                stopScanner();
            }
        }

        function stopScanner() {
            if (qr) {
                qr.stop().then(() => {
                    qr = null;
                    document.getElementById("scanner-wrapper").classList.add("hidden");
                    document.getElementById("laser-effect").classList.add("hidden");
                    document.getElementById("reader").innerHTML = "";
                }).catch(err => {
                    console.error("Gagal menghentikan scanner dengan aman:", err);
                    qr = null;
                    document.getElementById("scanner-wrapper").classList.add("hidden");
                    document.getElementById("laser-effect").classList.add("hidden");
                    document.getElementById("reader").innerHTML = "";
                });
            } else {
                document.getElementById("scanner-wrapper").classList.add("hidden");
                document.getElementById("laser-effect").classList.add("hidden");
            }
        }
    </script>
