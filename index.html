<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SO Suryatokoku Clean</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-soft': 'pulseSoft 2s infinite',
            'shake': 'shake 0.4s ease-in-out',
          },
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            shake: {
              '0%, 100%': { transform: 'translateX(0)' },
              '20%, 60%': { transform: 'translateX(-4px)' },
              '40%, 80%': { transform: 'translateX(4px)' },
            }
          }
        }
      }
    }
  </script>

  <!-- TomSelect Styling & JavaScript -->
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  
  <!-- HTML5 QR Code Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- Custom Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f8fafc; /* Very light slate bg */
      color: #0f172a;
      -webkit-tap-highlight-color: transparent;
    }

    /* FIX: TomSelect Dropdown Overlap Issue */
    .ts-dropdown {
      z-index: 9999 !important; /* Force dropdown to be on top */
      background-color: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
      border-radius: 12px !important;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1) !important;
      margin-top: 4px !important;
    }

    .ts-wrapper .ts-control {
      background-color: #f1f5f9 !important;
      border: 1px solid transparent !important;
      border-radius: 12px !important;
      padding: 14px 16px !important;
      font-size: 15px !important;
      font-weight: 500 !important;
      min-height: 52px !important;
      color: #334155 !important;
      transition: all 0.2s ease;
      box-shadow: none !important;
    }

    .ts-wrapper.focus .ts-control {
      background-color: #ffffff !important;
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important;
    }

    .ts-dropdown .option {
      padding: 12px 16px !important;
      color: #475569 !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      transition: background 0.15s ease;
    }

    .ts-dropdown .active, .ts-dropdown .option:hover {
      background-color: #eff6ff !important;
      color: #1d4ed8 !important;
    }

    /* Custom Inputs */
    .clean-input {
      background-color: #f1f5f9;
      border: 1px solid transparent;
      color: #0f172a;
      transition: all 0.2s;
    }
    .clean-input:focus {
      background-color: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      outline: none;
    }

    /* Scanner Viewfinder */
    #reader video {
      object-fit: cover !important;
      border-radius: 16px;
    }

    /* Dynamic Product States */
    .product-empty {
      border: 2px dashed #cbd5e1;
      background-color: #f8fafc;
      color: #64748b;
    }
    .product-found {
      border: 2px solid #10b981;
      background-color: #ecfdf5;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.1);
    }
    .product-error {
      border: 2px solid #ef4444;
      background-color: #fef2f2;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.1);
    }
  </style>
</head>

<body class="min-h-screen pb-12 relative overflow-x-hidden">

  <!-- Soft Decorative Background Shapes -->
  <div class="fixed top-0 left-0 w-full h-64 bg-gradient-to-b from-blue-50 to-transparent -z-10"></div>
  <div class="fixed -top-24 -right-24 w-64 h-64 bg-blue-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-20 -z-10"></div>
  <div class="fixed top-32 -left-24 w-64 h-64 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-20 -z-10"></div>

  <!-- Main Container -->
  <div class="container max-w-[480px] mx-auto px-4 pt-8 relative z-10">

    <!-- Header Section -->
    <header class="mb-6 text-center animate-slide-up" style="animation-delay: 0.1s; opacity: 0;">
      <h1 id="judulApp" class="text-2xl font-extrabold tracking-tight text-slate-800 mb-1">
        STOCK <span class="text-blue-600">OPNAME</span>
      </h1>
      <p class="text-xs font-medium text-slate-500 uppercase tracking-widest">SURYATOKOKU</p>
    </header>

    <!-- Master Sync Status Bar & Manual Sync Button Container -->
    <div class="flex gap-2.5 items-stretch mb-6 animate-slide-up" style="animation-delay: 0.2s; opacity: 0;">
      <!-- Status Box -->
      <div id="masterStatus" class="flex-1 p-3.5 rounded-2xl bg-white border border-slate-200 text-center text-sm font-semibold text-slate-600 shadow-sm flex flex-col justify-center items-center transition-all duration-300">
        <div class="animate-pulse-soft text-amber-500">⏳ Menunggu load master...</div>
      </div>
      <!-- Sync Icon Button -->
      <button id="btnSync" type="button" onclick="manualSync()" class="w-[52px] rounded-2xl bg-white border border-slate-200 hover:border-blue-200 text-slate-500 hover:text-blue-600 active:scale-95 transition-all duration-200 flex items-center justify-center shadow-sm" title="Sinkronisasi Data Terkini dari Sheet">
        <svg class="w-5 h-5 transition-transform duration-300" id="syncIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </div>

    <!-- MAIN INTERACTIVE HUB (Combined inside Single Card Container) -->
    <main class="bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 space-y-6 animate-slide-up relative z-20" style="animation-delay: 0.3s; opacity: 0;">

      <!-- PART 1: Operator Identity -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Pilih Tim</label>
          <div class="relative">
            <select id="tim" autocomplete="off" onchange="updatePetugas()" class="clean-input w-full px-4 py-3.5 rounded-xl appearance-none font-medium text-[15px] cursor-pointer min-h-[52px]">
              <option value="">Pilih Tim</option>
              <option value="Surtok">Surtok</option>
              <option value="Audit">Audit</option>
            </select>
            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Pilih Petugas</label>
          <select id="petugas" autocomplete="off" class="w-full">
            <option value="">Pilih Petugas</option>
          </select>
        </div>
      </div>

      <hr class="border-slate-100">

      <!-- PART 2: Warehouse Location -->
      <div class="rak-row flex gap-2.5 items-end">
        <div class="flex-1">
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Kode Rak</label>
          <input id="rak" placeholder="Contoh: A10" autocomplete="off" autocapitalize="off" spellcheck="false" oninput="formatRak(this)" class="clean-input w-full px-4 py-3.5 rounded-xl font-bold tracking-wider placeholder:tracking-normal placeholder:font-normal placeholder:text-slate-400 text-[15px] min-h-[52px] uppercase">
        </div>
        <button id="btnSelesai" type="button" onclick="selesaiRak()" class="h-[52px] px-4 bg-white border-2 border-rose-100 hover:border-rose-200 text-rose-600 font-bold text-sm rounded-xl active:scale-95 transition-all duration-200 flex items-center justify-center gap-1.5 whitespace-nowrap shadow-sm hover:bg-rose-50">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
          Selesaikan Rak
        </button>
      </div>

      <hr class="border-slate-100">

      <!-- PART 3: Searching & Scanning -->
      <div class="space-y-4">
        <!-- Live Camera Scanner Button -->
        <button id="btnScan" type="button" onclick="bukaScanner()" class="w-full h-14 bg-slate-800 hover:bg-slate-700 text-white font-bold text-[15px] rounded-xl shadow-md active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          Scan Kamera
        </button>

        <!-- Interactive QR Camera view -->
        <div id="reader" style="display:none;" class="w-full overflow-hidden border-2 border-dashed border-blue-200 rounded-2xl bg-slate-50 relative">
          <div class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-blue-500 z-10 rounded-tl-md"></div>
          <div class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-blue-500 z-10 rounded-tr-md"></div>
          <div class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-blue-500 z-10 rounded-bl-md"></div>
          <div class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-blue-500 z-10 rounded-br-md"></div>
        </div>

        <!-- Manual Barcode Input -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1">Input Manual / Barcode</label>
          <input id="scanInput" placeholder="Ketik barcode atau SKU..." onkeydown="cekInput(event)" oninput="resetProduk()" onblur="cekBlur()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="numeric" pattern="[0-9]*" disabled class="clean-input w-full px-4 py-3.5 rounded-xl font-medium placeholder:font-normal placeholder:text-slate-400 text-[15px] min-h-[52px] disabled:opacity-50 disabled:cursor-not-allowed">
        </div>

        <!-- Dynamic Product Info Display -->
        <div id="produk" class="product-empty p-5 rounded-xl flex flex-col justify-center items-center text-center text-sm font-medium transition-all duration-300 min-h-[100px]">
          Belum ada produk
        </div>
      </div>

      <hr class="border-slate-100">

      <!-- PART 4: Quantity & Submit -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 ml-1 text-center">Jumlah Fisik (Qty)</label>
          <div class="relative max-w-[200px] mx-auto">
            <input id="qty" type="number" placeholder="0" min="1" inputmode="numeric" autocomplete="off" class="clean-input w-full text-slate-800 text-center font-extrabold text-3xl px-4 py-3 rounded-2xl h-16">
          </div>
        </div>

        <button id="btnSimpan" type="button" onclick="simpan()" class="w-full h-14 bg-blue-600 hover:bg-blue-700 text-white font-bold text-[15px] rounded-2xl shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
          SIMPAN DATA
        </button>
      </div>

    </main>
  </div>

  <!-- CLEAN POPUP MODAL -->
  <div id="popup" class="popup fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[99999] hidden justify-center items-center px-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white p-6 w-full max-w-sm rounded-3xl text-center shadow-2xl transform scale-95 transition-transform duration-300" id="popup-content">
      <div class="w-14 h-14 mx-auto mb-4 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </div>
      <div id="popupText" class="text-slate-700 font-medium text-[15px] leading-relaxed mb-6">Pesan</div>
      <button type="button" onclick="tutupPopup()" class="w-full py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold rounded-xl active:scale-95 transition-all duration-200">
        Mengerti
      </button>
    </div>
  </div>

  <!-- MAIN APP CONTROLLER & LOGIC -->
  <script>
    const API = "https://script.google.com/macros/s/AKfycbxpDBK-_y2heN6b8EkXyiwg9cqkXB-hWYU-KXwDjQmlaI2W7cB-v0baDYjADQpkxrc5/exec";

    let MASTER = [];
    let produk = null;
    let scanner = null;
    const audioSukses = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    const audioError = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");
    let MASTER_MAP = {};
    let petugasSelect = null;

    // Memori Penyimpanan Sementara (Cache) Nama Petugas agar Load Instan
    let PETUGAS_CACHE = {
      "Surtok": [],
      "Audit": []
    };

    window.onload = async () => { 
      // Ambil daftar nama petugas secara paralel di latar belakang (background) agar menghemat waktu
      preFetchPetugas(); 
      await loadMaster(); 
    };

    // Fungsi mengambil daftar nama petugas di awal
    async function preFetchPetugas() {
      try {
        const [resSurtok, resAudit] = await Promise.all([
          fetch(API + "?action=petugas&tim=Surtok"),
          fetch(API + "?action=petugas&tim=Audit")
        ]);
        const dataSurtok = await resSurtok.json();
        const dataAudit = await resAudit.json();
        
        PETUGAS_CACHE["Surtok"] = dataSurtok.data || [];
        PETUGAS_CACHE["Audit"] = dataAudit.data || [];
      } catch (err) {
        console.log("Gagal melakukan pre-fetch petugas di background, akan ditarik manual saat tim dipilih.", err);
      }
    }

    // Fungsi untuk memicu sinkronisasi ulang secara manual dari tombol UI
    async function manualSync() {
      const btnSync = document.getElementById("btnSync");
      const syncIcon = document.getElementById("syncIcon");

      if (btnSync.disabled) return;

      // Kunci tombol & tambahkan animasi putar
      btnSync.disabled = true;
      btnSync.classList.add("opacity-50");
      syncIcon.classList.add("animate-spin");

      // Jalankan sinkronisasi ulang master produk dan daftar petugas
      await Promise.all([
        loadMaster(),
        preFetchPetugas()
      ]);

      // Lepaskan kunci tombol & matikan animasi putar
      btnSync.disabled = false;
      btnSync.classList.remove("opacity-50");
      syncIcon.classList.remove("animate-spin");

      // Mainkan suara sukses sebagai penanda rampung
      bunyiSukses();
    }

    async function updatePetugas() {
      const tim = document.getElementById("tim").value;
      const petugas = document.getElementById("petugas");

      if (petugasSelect) {
        petugasSelect.destroy();
        petugasSelect = null;
      }

      if (!tim) {
        petugas.innerHTML = '<option value="">Pilih Petugas</option>';
        petugasSelect = new TomSelect("#petugas", { create: false, sortField: "text" });
        return;
      }

      // OPTIMASI: Jika nama petugas sudah ada di cache, langsung tampilkan secara instan
      if (PETUGAS_CACHE[tim] && PETUGAS_CACHE[tim].length > 0) {
        renderPetugasOptions(PETUGAS_CACHE[tim]);
        return;
      }

      // Fallback jika pre-fetch gagal atau belum selesai ditarik di awal
      petugas.innerHTML = '<option value="">Memuat...</option>';

      try {
        const res = await fetch(API + "?action=petugas&tim=" + encodeURIComponent(tim));
        const data = await res.json();
        const list = data.data || [];
        
        PETUGAS_CACHE[tim] = list; // Simpan ke cache
        renderPetugasOptions(list);
      } catch (err) {
        console.log(err);
        petugas.innerHTML = '<option value="">Gagal memuat</option>';
      }
    }

    // Fungsi render nama petugas ke select element & inisialisasi TomSelect
    function renderPetugasOptions(list) {
      const petugas = document.getElementById("petugas");
      petugas.innerHTML = '<option value="">Pilih Petugas</option>';

      list.forEach(nama => {
        petugas.innerHTML += `<option value="${nama}">${nama}</option>`;
      });

      petugas.value = "";

      petugasSelect = new TomSelect("#petugas", {
        create: false,
        sortField: "text"
      });
    }

    async function loadMaster() {
      const statusDiv = document.getElementById("masterStatus");
      const scanBtn = document.getElementById("btnScan");
      const scanInput = document.getElementById("scanInput");

      scanBtn.disabled = true;
      scanInput.disabled = true;

      try {
        statusDiv.className = "flex-1 p-3.5 rounded-2xl bg-amber-50 border border-amber-200 text-center text-sm flex flex-col justify-center items-center transition-all duration-300";
        statusDiv.innerHTML = `
          <div class="flex items-center gap-2 text-amber-600 font-bold">
            <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2"></path></svg>
            <span>Memuat Database...</span>
          </div>
        `;

        const res = await fetch(API + "?action=master&t=" + Date.now(), { cache: "no-store" });
        const data = await res.json();

        MASTER = [];
        MASTER_MAP = {};

        (data.data || []).forEach(item => {
          const obj = {
            kode: String(item.kode || "").trim().toUpperCase(),
            nama: String(item.nama || ""),
            barcode: String(item.barcode || "").trim().toUpperCase()
          };
          MASTER.push(obj);
          MASTER_MAP[obj.kode] = obj;
          MASTER_MAP[obj.barcode] = obj;
        });

        scanBtn.disabled = false;
        scanInput.disabled = false;
        
        statusDiv.className = "flex-1 p-3.5 rounded-2xl bg-emerald-50 border border-emerald-200 text-center text-sm flex flex-col justify-center items-center transition-all duration-300";
        statusDiv.innerHTML = `
          <div class="flex items-center gap-1.5 text-emerald-600 font-bold">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            <span>Database Siap (${MASTER.length} SKU)</span>
          </div>
        `;
        scanInput.focus();

      } catch (err) {
        console.log(err);
        statusDiv.className = "flex-1 p-3.5 rounded-2xl bg-red-50 border border-red-200 text-center text-sm flex flex-col justify-center items-center transition-all duration-300";
        statusDiv.innerHTML = `
          <div class="flex items-center gap-1.5 text-red-600 font-bold">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <span>Gagal Memuat Master</span>
          </div>
        `;
      }
    }

    async function bukaScanner() {
      try {
        const reader = document.getElementById("reader");
        reader.style.display = "block";

        if (scanner) {
          await scanner.stop();
          await scanner.clear();
          scanner = null;
          reader.innerHTML = `
            <div class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-blue-500 z-10 rounded-tl-md"></div>
            <div class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-blue-500 z-10 rounded-tr-md"></div>
            <div class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-blue-500 z-10 rounded-bl-md"></div>
            <div class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-blue-500 z-10 rounded-br-md"></div>
          `;
          reader.style.display = "none";
          return;
        }

        scanner = new Html5Qrcode("reader");
        await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, hasilScan);
      } catch (err) {
        console.log(err);
        tampilPopup("Gagal mengakses kamera. Periksa izin browser Anda.");
      }
    }

    async function hasilScan(text) {
      document.getElementById("scanInput").value = text;
      bunyiBeep();
      cariProduk(text);

      if (scanner) {
        await scanner.stop();
        await scanner.clear();
        scanner = null;
      }
      
      const reader = document.getElementById("reader");
      reader.innerHTML = `
        <div class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-blue-500 z-10 rounded-tl-md"></div>
        <div class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-blue-500 z-10 rounded-tr-md"></div>
        <div class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-blue-500 z-10 rounded-bl-md"></div>
        <div class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-blue-500 z-10 rounded-br-md"></div>
      `;
      reader.style.display = "none";
    }

    // Play standard beep audio
    function bunyiBeep() {
      new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
    }

    function cekInput(e) {
      if (e.key === "Enter" || e.key === "NumpadEnter" || e.key === "Tab") {
        e.preventDefault();
        setTimeout(() => {
          const input = document.getElementById("scanInput").value.trim();
          if (!input) { return; }
          cariProduk(input);
        }, 100);
      }
    }

    // Play error sound
    function bunyiError() {
      audioError.currentTime = 0;
      audioError.play();
    }

    function cekBlur() {
      const input = document.getElementById("scanInput").value.trim();
      if (!input) { return; }
      produk = null;
      cariProduk(input);
    }

    function cariProduk(input) {
      input = String(input).trim().toUpperCase();
      produk = null;
      produk = MASTER_MAP[input];

      const produkBox = document.getElementById("produk");

      if (!produk) {
        bunyiError();
        produkBox.className = "product-error p-5 rounded-xl flex flex-col justify-center items-center text-center text-red-600 text-sm font-bold min-h-[100px] transition-all duration-300 animate-shake";
        produkBox.innerHTML = `
          <div class="flex items-center gap-1 mb-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            Produk Tidak Ditemukan
          </div>
        `;
        document.getElementById("scanInput").value = "";
        
        setTimeout(() => {
          produkBox.className = "product-empty p-5 rounded-xl flex flex-col justify-center items-center text-center text-slate-500 text-sm font-medium min-h-[100px] transition-all duration-300";
          produkBox.innerHTML = "Belum ada produk";
          document.getElementById("scanInput").focus();
        }, 3000);
        return;
      }

      bunyiSukses();

      produkBox.className = "product-found p-5 rounded-xl flex flex-col justify-center items-start text-left text-slate-800 text-sm min-h-[100px] transition-all duration-300";
      produkBox.innerHTML = `
        <div class="w-full">
          <div class="text-[11px] font-bold text-emerald-600 uppercase tracking-wider mb-1 flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> Ditemukan
          </div>
          <b class="text-base font-bold text-slate-800 block mb-2 leading-tight">${produk.nama}</b>
          <div class="grid grid-cols-2 gap-1 text-xs text-slate-500 mt-2 pt-2 border-t border-emerald-100">
            <div>Kode: <span class="font-bold text-slate-700">${produk.kode}</span></div>
            <div>Barcode: <span class="font-bold text-slate-700">${produk.barcode}</span></div>
          </div>
        </div>
      `;

      document.getElementById("qty").focus();
    }

    async function simpan() {
      const btn = document.getElementById("btnSimpan");

      if (!document.getElementById("tim").value ||
          !document.getElementById("petugas").value ||
          !document.getElementById("rak").value) {
        tampilPopup("Harap pilih <b>Tim</b>, <b>Petugas</b>, dan isi <b>Kode Rak</b>.");
        return;
      }

      if (!produk) {
        tampilPopup("Harap scan atau pilih produk terlebih dahulu.");
        return;
      }

      btn.disabled = true;
      btn.style.opacity = "0.7";
      btn.innerHTML = `
        <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2"></path></svg>
        Menyimpan...
      `;

      const body = {
        action: "save",
        tim: document.getElementById("tim").value,
        petugas: document.getElementById("petugas").value,
        rak: document.getElementById("rak").value,
        kode: produk.kode,
        nama: produk.nama,
        barcode: produk.barcode,
        qty: document.getElementById("qty").value
      };

      try {
        const res = await fetch(API, { method: "POST", body: JSON.stringify(body) });
        const data = await res.json();

        if (!data.status) { throw new Error(); }

        document.getElementById("scanInput").value = "";
        document.getElementById("qty").value = "";
        
        const produkBox = document.getElementById("produk");
        produkBox.className = "product-empty p-5 rounded-xl flex flex-col justify-center items-center text-center text-slate-500 text-sm font-medium min-h-[100px] transition-all duration-300";
        produkBox.innerHTML = "Belum ada produk";
        
        produk = null;
        document.getElementById("scanInput").focus();

      } catch (err) {
        console.log(err);
        tampilPopup("Gagal menyimpan data. Periksa koneksi internet Anda.");
      }

      btn.disabled = false;
      btn.style.opacity = "1";
      btn.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
        SIMPAN DATA
      `;
    }

    function tampilPopup(pesan) {
      document.getElementById("popupText").innerHTML = pesan;
      const popup = document.getElementById("popup");
      const content = document.getElementById("popup-content");
      
      popup.style.display = "flex";
      setTimeout(() => {
        popup.classList.remove("opacity-0", "hidden");
        content.classList.remove("scale-95");
        content.classList.add("scale-100");
      }, 10);
    }

    function tutupPopup() {
      const popup = document.getElementById("popup");
      const content = document.getElementById("popup-content");
      
      popup.classList.add("opacity-0");
      content.classList.remove("scale-100");
      content.classList.add("scale-95");
      
      setTimeout(() => {
        popup.style.display = "none";
        popup.classList.add("hidden");
      }, 300);
    }

    async function selesaiRak() {
      const tim = document.getElementById("tim").value;
      const petugas = document.getElementById("petugas").value;
      const rak = document.getElementById("rak").value;

      if (!tim || !petugas) {
        tampilPopup("Harap pilih Tim dan Petugas terlebih dahulu.");
        return;
      }

      if (!rak) {
        tampilPopup("Kode rak tidak boleh kosong.");
        return;
      }

      const body = { action: "selesaiRak", tim, petugas, rak };

      document.getElementById("rak").value = "";
      document.getElementById("rak").focus();

      try {
        await fetch(API, { method: "POST", body: JSON.stringify(body) });
      } catch (err) {
        console.log(err);
      }
    }

    function resetProduk() {
      produk = null;
      const produkBox = document.getElementById("produk");
      produkBox.className = "product-empty p-5 rounded-xl flex flex-col justify-center items-center text-center text-slate-500 text-sm font-medium min-h-[100px] transition-all duration-300";
      produkBox.innerHTML = "Belum ada produk";
    }

    function bunyiSukses() {
      audioSukses.currentTime = 0;
      audioSukses.play();
    }

    // Hanya membatasi karakter alfabet & angka uppercase
    function formatRak(input) {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
    }
  </script>

</body>
</html>
