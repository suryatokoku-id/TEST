<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Scan Barcode Produk</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
text-align:center;
}

h2{
margin-bottom:20px;
}

#reader{
width:100%;
max-width:420px;
margin:auto;
border-radius:12px;
overflow:hidden;
}

#hasil{
margin-top:20px;
padding:15px;
background:#fff;
border-radius:10px;
font-size:22px;
font-weight:bold;
color:#1565c0;
word-break:break-all;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
cursor:pointer;
}

button:hover{
background:#125ea7;
}

</style>

</head>

<body>

<h2>Scan Barcode Produk</h2>

<div id="reader"></div>

<div id="hasil">
Belum ada barcode
</div>

<button onclick="startScanner()">Mulai Scan</button>

<script>

let scanner;

async function startScanner(){

    document.getElementById("hasil").innerHTML="Membuka kamera...";

    if(scanner){
        await scanner.clear().catch(()=>{});
    }

    scanner = new Html5Qrcode("reader");

    try{

        const cameras = await Html5Qrcode.getCameras();

        if(cameras.length===0){
            alert("Kamera tidak ditemukan");
            return;
        }

        let cameraId = cameras[0].id;

        cameras.forEach(cam=>{

            const name=(cam.label||"").toLowerCase();

            if(
                name.includes("back") ||
                name.includes("rear") ||
                name.includes("environment")
            ){
                cameraId=cam.id;
            }

        });

        await scanner.start(

            cameraId,

            {
                fps:15,
                qrbox:{
                    width:260,
                    height:120
                },

                formatsToSupport:[
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.ITF
                ]

            },

            (decodedText)=>{

                navigator.vibrate?.(100);

                document.getElementById("hasil").innerHTML=decodedText;

                scanner.pause();

                setTimeout(()=>{

                    scanner.resume();

                },1200);

            },

            ()=>{}

        );

    }

    catch(err){

        console.error(err);

        alert(err);

    }

}

</script>

</body>
</html>
